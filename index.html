<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRITICAL FOR MOBILE: Prevents shrinking and allows full-screen scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flappy Bird Mobile</title>
    <style>
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #222; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Arial', sans-serif; 
        }
        canvas { 
            background: #70c5ce; 
            border: 2px solid #fff; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            max-width: 100vw; 
            max-height: 100vh;
        }
        #ui { 
            position: absolute; 
            color: white; 
            text-align: center; 
            pointer-events: none; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            z-index: 10; 
            width: 100%; 
            top: 10%;
        }
        #leaderboard {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); color: white; padding: 20px; border-radius: 15px;
            display: none; z-index: 100; width: 80%; max-width: 280px; text-align: center; border: 3px solid #f1c40f;
        }
        #playerName { padding: 12px; width: 85%; margin: 10px 0; border-radius: 5px; border: none; font-size: 18px; }
        #saveBtn { padding: 12px; background: #2ecc71; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; width: 93%; font-size: 16px; }
        .score-list { text-align: left; margin-top: 15px; font-family: monospace; font-size: 14px; }
        .score-item { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dotted #444; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="scoreDisplay">0</h1>
        <p id="msg">TAP TO START</p>
    </div>

    <div id="leaderboard">
        <h2 id="lbStatus">GAME OVER</h2>
        <input type="text" id="playerName" maxlength="10" placeholder="Your Name">
        <button id="saveBtn" onclick="saveScore()">SAVE & RESTART</button>
        <div class="score-list" id="highScores"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const msg = document.getElementById("msg");
    const lbDiv = document.getElementById("leaderboard");

    // Standard portrait ratio
    canvas.width = 320;
    canvas.height = 480;

    const GRAVITY = 0.18;
    const JUMP = -3.8;
    const PIPE_SPEED = 1.6;
    const CLOUD_SPEED = 0.4;
    const PIPE_SPAWN_RATE = 150;
    const PIPE_GAP = 145;

    let bird, pipes, clouds, frame, score, gameRunning, waitingForName;

    function resetGame() {
        bird = { x: 50, y: 150, w: 34, h: 24, velocity: 0, rotation: 0 };
        pipes = [];
        clouds = [
            { x: 50, y: 80, s: 0.8 },
            { x: 200, y: 150, s: 1.1 },
            { x: 350, y: 50, s: 0.9 }
        ];
        frame = 0;
        score = 0;
        gameRunning = false;
        waitingForName = false;
        scoreDisplay.innerText = "0";
        msg.style.opacity = 1;
        msg.innerText = "TAP TO START";
        lbDiv.style.display = "none";
    }

    function spawnPipe() {
        const h = Math.floor(Math.random() * (canvas.height - PIPE_GAP - 120)) + 50;
        pipes.push({ x: canvas.width, y: 0, w: 50, h: h, passed: false });
    }

    function update() {
        if (!gameRunning || waitingForName) return;

        clouds.forEach(c => {
            c.x -= CLOUD_SPEED * c.s;
            if (c.x + 100 < 0) c.x = canvas.width + 50;
        });

        bird.velocity += GRAVITY;
        bird.y += bird.velocity;

        if (bird.y + bird.h > canvas.height - 22 || bird.y < 0) gameOver();

        if (frame % PIPE_SPAWN_RATE === 0) spawnPipe();

        pipes.forEach((pipe, index) => {
            pipe.x -= PIPE_SPEED;
            if (!pipe.passed && bird.x > pipe.x + pipe.w) {
                score++;
                scoreDisplay.innerText = score;
                pipe.passed = true;
            }
            if (bird.x + bird.w - 5 > pipe.x && bird.x + 5 < pipe.x + pipe.w) {
                if (bird.y + 5 < pipe.h || bird.y + bird.h - 5 > pipe.h + PIPE_GAP) gameOver();
            }
            if (pipe.x + pipe.w < 0) pipes.splice(index, 1);
        });
        frame++;
    }

    function drawCloud(x, y) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.arc(x + 25, y - 10, 25, 0, Math.PI * 2);
        ctx.arc(x + 55, y, 20, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawBird() {
        ctx.save();
        ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
        ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.velocity * 0.1)));
        
        ctx.fillStyle = "#f1c40f";
        ctx.beginPath(); ctx.ellipse(0, 0, bird.w/2, bird.h/2, 0, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();

        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(8, -5, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(10, -5, 2, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = "#e67e22";
        ctx.beginPath();
        ctx.moveTo(12, 0); ctx.lineTo(22, 2); ctx.lineTo(12, 6);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        ctx.fillStyle = "#f39c12";
        let wingB = bird.velocity < 0 ? -8 : 0;
        ctx.beginPath(); ctx.ellipse(-8, wingB, 10, 6, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();

        ctx.restore();
    }

    function draw() {
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        clouds.forEach(c => drawCloud(c.x, c.y));

        pipes.forEach(pipe => {
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(pipe.x, 0, pipe.w, pipe.h);
            ctx.strokeRect(pipe.x, 0, pipe.w, pipe.h);
            const bottomY = pipe.h + PIPE_GAP;
            ctx.fillRect(pipe.x, bottomY, pipe.w, canvas.height - bottomY);
            ctx.strokeRect(pipe.x, bottomY, pipe.w, canvas.height - bottomY);
        });

        drawBird();

        ctx.fillStyle = "#ded895";
        ctx.fillRect(0, canvas.height - 22, canvas.width, 22);

        requestAnimationFrame(() => { update(); draw(); });
    }

    function gameOver() {
        gameRunning = false;
        waitingForName = true;
        const scores = JSON.parse(localStorage.getItem("flappyScores") || "[]");
        lbDiv.style.display = "block";
        document.getElementById("lbStatus").innerText = "LEADERBOARD";
        const list = document.getElementById("highScores");
        list.innerHTML = scores.map((s, i) => `
            <div class="score-item">
                <span>${i+1}. ${s.name}</span>
                <span>${s.score}</span>
            </div>
        `).join('');
    }

    function saveScore() {
        const nameInput = document.getElementById("playerName");
        const name = nameInput.value || "Player";
        let scores = JSON.parse(localStorage.getItem("flappyScores") || "[]");

        if (score > 0) {
            scores.push({ name, score });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5);
            localStorage.setItem("flappyScores", JSON.stringify(scores));
        }

        nameInput.value = "";
        resetGame();
    }

    function input(e) {
        if (waitingForName) return; 
        if (e && e.type === 'touchstart') e.preventDefault(); // Prevents double triggers on mobile
        
        if (!gameRunning) {
            gameRunning = true;
            msg.style.opacity = 0;
        }
        bird.velocity = JUMP;
    }

    // --- MOBILE & DESKTOP LISTENERS ---
    window.addEventListener("keydown", (e) => { if(e.code === "Space") input(); });
    // Use touchstart for immediate mobile response
    window.addEventListener("touchstart", input, { passive: false });
    // Mouse click for desktop
    window.addEventListener("mousedown", (e) => { 
        if(e.target === canvas) input(); 
    });

    resetGame();
    draw();
</script>
</body>
</html>
